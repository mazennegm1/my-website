<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NHU</title>
    <link rel="stylesheet" href="Style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="body-login">
    <header class="header-main">
        <div class="logo">
            <a href=""><img src="/img/nhulogo.png" alt="NHU Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i>Home</a></li>
                <li> <a href="about.html"><i class="fa-solid fa-circle-info"></i>About</a></li>
                <li><a href="academics.html"><i class="fa-solid fa-graduation-cap"></i>Academics</a></li>
                <li> <a href="admission.html"><i class="fa-solid fa-pen-to-square"></i>Admissions</a>
                </li>
                <li> <a href="news.html"><i class="fa-solid fa-newspaper"></i>News</a>
                </li>
                <li> <a href="contact-us.html"><i class="fa-solid fa-address-book"></i>Contact Us</a>
                </li>
            </ul>



        </nav>
        <div class="acctions">
            <button id="mode"><i class="fa-solid fa-moon"></i></button>
            <a href="admission.html">Apply Now</a>
            <a href="login.html">NHU Portal</a>
        </div>
    </header>

    <main class="main-login">
        <div id="login-error">
            <strong> <i class="fa-solid fa-triangle-exclamation"></i> Login Failed!</strong>
            <p>Invalid email or password</p>
        </div>
        <section class="login">

            <div class="login-form">
                <form class="form-login">
                    <h1>Welcome Back!</h1>

                    <div class="username">
                        <label for="username">
                            <i class="fa-solid fa-user"></i>
                            Email
                        </label>
                        <input type="text" name="username" id="username" placeholder="Email">
                    </div>

                    <div class="password">
                        <label for="password">
                            <i class="fa-solid fa-lock"></i>
                            Password
                        </label>
                        <div>
                            <input type="password" name="password" id="password" placeholder="Password">
                            <button type="button" id="eye" class="eye"><i class="fa-solid fa-eye-slash"></i></button>
                        </div>
                    </div>
                    <div class="login-actions">
                        <div class="remember-me">
                            <input type="checkbox" name="remember-me" id="remember-me-ch">
                            <label for="remember-me-ch">Remember Me</label>
                        </div>
                        <div class="forget-password">
                            <a href="">Forget Password?</a>
                        </div>
                    </div>
                    <div class="btn-login">
                        <div class="login-btn">
                            <input type="submit" value="Login">
                        </div>
                        <div class="help">
                            <a>Need Help?</a>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>


    <script src="script.js"></script>
</body>

</html>
