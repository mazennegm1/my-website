<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | NHU</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="Style/style.css">
</head>

<body class="dashboard">
  <aside class="sidebar">

    <ul>
      <div class="logo-dashboard">
        <a href="#"><img src="/img/nhulogo.png" alt=""></a>
      </div>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-house"></i>
          Dashboard </a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-layer-group"></i> Courses
        </a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-users"></i><span>Students</span>
        </a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-clipboard-user"></i><span>Attendance</span>
        </a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-chart-line"></i><span>Grades</span></a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-envelope"></i><span>Messages</span>
        </a>
      </li>
      <li class="sidebar1">
        <a href="">
          <i class="fa-solid fa-gear"></i><span>Settings</span>
        </a>
      </li>
      <li class="logout">
        <a href="index.html">
          <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
        </a>
      </li>
    </ul>
  </aside>
  <header class="header-dashboard">

    <div>
      <h1>Student Feedback</h1>
    </div>
    <div class="actions">
      <a href=""><i class="fa-solid fa-bell"></i></a>
      <a href=""><i class="fa-solid fa-circle-user"></i></a>
      <button id="mode"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>
  <main class="main-dashboard">
    <div class="staff-content">
      <div class="form-card">

        <div class="grid-top-row">
          <div class="input-box">
            <label>Feedback form type:</label>
            <select>
              <option>Lab coursework feedback</option>
              <option>Project feedback</option>
              <option>Class test feedback</option>
            </select>
          </div>
          <div class="input-box">
            <label>Academic Year:</label>
            <select>
              <option>PREP</option>
              <option>YEAR 1</option>
              <option>YEAR 2</option>
              <option>YEAR 3</option>
            </select>
          </div>
        </div>

        <div class="main-info-grid">
          <div class="input-box">
            <label>Module Name:</label>
            <div class="module-input-wrap">
              <input type="text" placeholder="Start typing name...">
            </div>
          </div>

          <div class="input-box">
            <label>Module Code:</label>
            <input type="text" placeholder="e.g. CS101">
          </div>

          <div class="input-box">
            <label>Student ID:</label>
            <input type="text" placeholder="Filter By Student ID">
          </div>

          <div class="input-box">
            <label>Module Leader(s):</label>
            <input type="text">
          </div>

          <div class="input-box">
            <label>Student Name:</label>
            <input type="text">
          </div>

          <div class="input-box">
            <label>Grade:</label>
            <input type="text" disabled>
          </div>
        </div>

        <hr class="section-divider">

        <h2>Question 1</h2>

        <div class="feedback-grid">
          <label class="grid-label q-mark">Question Mark</label>
          <label class="grid-label s-mark">Student Mark</label>

          <div class="input-box">
            <label>Grade</label>
            <select>
              <option></option>
            </select>
          </div>

          <div class="input-box">
            <label>Comment</label>
            <div class="comment-input-row">
              <textarea id="question1Text" rows="2" placeholder="Write student feedback..."></textarea>
              <button class="btn-dark" onclick="addCommentToPinkBox()">Add Comment</button>
            </div>
          </div>

          <div class="input-box col-3">
            <input type="text">
          </div>

          <div class="input-box col-4">
            <input type="text">
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-green">Save Form and Generate PDF</button>
        </div>

      </div>

    </div>
  </main>
  <footer class="footer-dashboard">
    <div class="footer-top">
      <div class="support">
        <a href="">Support</a>
        <a href="">Privacy</a>
        <a href="">Contact</a>
      </div>
    </div>
    <div class="footer-mid">
      <h3>
        FOLLOW US</h3>
      <ul>
        <li><a href=""><i class="fa-brands fa-facebook"></i></a></li>
        <li><a href=""><i class="fa-brands fa-tiktok"></i></a></li>
        <li><a href=""><i class="fa-brands fa-youtube"></i></a></li>
        <li><a href=""><i class="fa-brands fa-instagram"></i></a></li>
      </ul>
    </div>
    <div class="footer-bottom">
      <i class="fa-solid fa-copyright"></i>
      <p> Nile Horizon University</p>
    </div>
  </footer>

  <script src="/script.js"></script>

</body>

</html>
